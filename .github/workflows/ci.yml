name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Maven >= 3.9 (Tycho 4)
        run: mvn -version

      - name: Build the language plugins (Tycho reactor)
        working-directory: releng
        run: mvn -B clean install -DskipTests

      - name: Build the language-server / CLI jar
        working-directory: releng/lsp-server
        run: mvn -B clean package -Dproguard.skip=true

      - name: Install Icarus Verilog (for elaboration check)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq iverilog

      - name: Generate Verilog + elaborate every example (gate-free)
        run: |
          set -e
          JAR="$PWD/releng/lsp-server/target/cg-language-server.jar"
          LIB="$PWD/fragments/com.neosyn.ide.libraries/lib/verilog/src/std"
          fail=0
          for cg in examples/*.cg; do
            name=$(basename "$cg" .cg)
            out="/tmp/gen_$name"; rm -rf "$out"; mkdir -p "$out"
            if ! java -jar "$JAR" generate "$cg" --output "$out"; then
              echo "::error::$name failed to generate"; fail=1; continue
            fi
            vfiles=$(find "$out" -name '*.v')
            if iverilog -t null -g2012 -y "$LIB/lib" -y "$LIB/mem" -y "$LIB/fifo" $vfiles; then
              echo "✓ $name — generated + elaborated ($(echo "$vfiles" | wc -l) .v files)"
            else
              echo "::error::$name produced Verilog that iverilog rejected"; fail=1
            fi
          done
          exit $fail

      - name: Upload the jar
        uses: actions/upload-artifact@v4
        with:
          name: cg-language-server
          path: releng/lsp-server/target/cg-language-server.jar
