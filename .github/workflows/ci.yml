name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Maven >= 3.9 (Tycho 4)
        run: mvn -version

      - name: Build the language plugins (Tycho reactor)
        working-directory: releng
        run: mvn -B clean install -DskipTests

      - name: Build the language-server / CLI jar
        working-directory: releng/lsp-server
        run: mvn -B clean package -Dproguard.skip=true

      - name: Smoke test — generate Verilog from C⏚ (gate-free)
        run: |
          set -e
          JAR=releng/lsp-server/target/cg-language-server.jar
          mkdir -p /tmp/ci
          cat > /tmp/ci/MovingAvg.cg <<'CG'
          package ci;

          task MovingAvg {
            in  stream u8 sample;
            out stream u8 filtered;

            u8 window[4];
            u2 head;

            void loop() {
              u8 x = sample.read;
              window[head] = x;
              head = (u2)(head + 1);
              u10 sum = (u10)(window[0] + window[1] + window[2] + window[3]);
              filtered.write((u8)(sum >> 2));
            }
          }
          CG
          java -jar "$JAR" generate /tmp/ci/MovingAvg.cg
          test -f /tmp/ci/verilog-gen/ci/MovingAvg.v
          echo "✓ generated $(wc -l < /tmp/ci/verilog-gen/ci/MovingAvg.v) lines of Verilog"
          head -20 /tmp/ci/verilog-gen/ci/MovingAvg.v

      - name: Upload the jar
        uses: actions/upload-artifact@v4
        with:
          name: cg-language-server
          path: releng/lsp-server/target/cg-language-server.jar
