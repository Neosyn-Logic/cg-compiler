# Log4j Configuration for Cx Language Server
# CRITICAL: All logging must go to stderr, NOT stdout!
# stdout is reserved for JSON-RPC communication with the LSP client.

# Root logger - write WARN+ to stderr
log4j.rootLogger=WARN, stderr

# STDERR appender - LSP-safe logging
log4j.appender.stderr=org.apache.log4j.ConsoleAppender
log4j.appender.stderr.Target=System.err
log4j.appender.stderr.layout=org.apache.log4j.PatternLayout
log4j.appender.stderr.layout.ConversionPattern=[%p] %c{1} - %m%n

# Suppress verbose Xtext logging
log4j.logger.org.eclipse.xtext=ERROR
log4j.logger.org.eclipse.xtext.validation=ERROR
log4j.logger.org.eclipse.xtext.parsetree=ERROR
log4j.logger.org.eclipse.xtext.build=ERROR

# Silence validator subclasses that fall over on missing Eclipse-runtime
# classes (e.g. IResource) when the LSP runs headless from the shaded JAR.
# Validation continues; we just don't dump the stack trace on every file.
log4j.logger.org.eclipse.xtext.validation.CompositeEValidator=OFF
log4j.logger.org.eclipse.xtext.validation.ResourceValidatorImpl=OFF

# Suppress EMF logging (source of MissingResourceException)
log4j.logger.org.eclipse.emf=ERROR

# Suppress Guice logging
log4j.logger.com.google.inject=ERROR
