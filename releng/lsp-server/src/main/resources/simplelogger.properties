# SLF4J Simple Logger configuration for Cx Language Server
# Suppress noisy EMF/Xtext warnings that don't affect functionality

# Default log level
org.slf4j.simpleLogger.defaultLogLevel=info

# Suppress EMF resource locator warnings (missing translation strings)
org.slf4j.simpleLogger.log.org.eclipse.xtext.validation.ResourceValidatorImpl=off
org.slf4j.simpleLogger.log.org.eclipse.xtext.validation.CompositeEValidator=off
org.slf4j.simpleLogger.log.org.eclipse.xtext.build.ResolvedResourceDescription=off

# Keep important loggers at info level
org.slf4j.simpleLogger.log.com.neosyn=info

# Show thread name and log level
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.levelInBrackets=true
